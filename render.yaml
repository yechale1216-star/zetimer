# Render Blueprint for Zetime (Frontend + Backend)
services:
  # Backend Express Service
  - type: web
    plan: free
    name: zetime-backend
    env: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false

  # Frontend Next.js Service
  - type: web
    plan: free
    name: zetime-frontend
    env: node
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        value: https://zetimer-ctgw.onrender.com
      - key: NEXT_PUBLIC_APP_URL
        value: https://zetimer-ctgw.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
